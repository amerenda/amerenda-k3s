# GitHub Actions Runner Scale Set Helm Chart Values
# Deploy ARC runner scale set to arc-runners namespace

# GitHub configuration - repo-level (personal accounts don't support org-level runners)
githubConfigUrl: "https://github.com/amerenda/amerenda-k3s"

# Runner scale set name (used as runs-on in workflows)
runnerScaleSetName: arc-runner-set

# GitHub App authentication
githubConfigSecret: controller-manager

# Controller service account configuration
controllerServiceAccount:
  name: infra-arc-controller
  namespace: arc-systems

# Autoscaling
minRunners: 1
maxRunners: 3

# Runner pod template — manual dind setup
# (containerMode.type: dind is NOT used because the Helm chart ignores
#  initContainer overrides when it generates its own dind container)
template:
  spec:
    securityContext:
      fsGroup: 1000
    restartPolicy: Never
    initContainers:
      - name: init-dind-externals
        image: ghcr.io/actions/actions-runner:latest
        command: ["cp"]
        args: ["-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir
      - name: dind
        image: docker:dind
        restartPolicy: Always
        args:
          - dockerd
          - --host=unix:///var/run/docker.sock
          - --group=$(DOCKER_GROUP_GID)
        env:
          - name: DOCKER_GROUP_GID
            value: "123"
        securityContext:
          privileged: true
        startupProbe:
          exec:
            command: ["docker", "info"]
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 10
          failureThreshold: 24
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKER_HOST
            value: "unix:///var/run/docker.sock"
          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
            value: "120"
          - name: DOCKERHUB_USERNAME
            value: "amerenda"
          - name: DOCKERHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: DOCKERHUB_TOKEN
          - name: GITOPS_PAT
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: GITOPS_PAT
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
    volumes:
      - name: dind-sock
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
      - name: work
        emptyDir: {}

namespaceOverride: arc-runners
