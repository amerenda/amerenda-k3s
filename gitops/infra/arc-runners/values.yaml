# GitHub Actions Runner Scale Set Helm Chart Values
# Deploy ARC runner scale set to arc-runners namespace

# GitHub configuration - account-level (serves all amerenda repos)
githubConfigUrl: "https://github.com/amerenda"

# Runner scale set name (used as runs-on in workflows)
runnerScaleSetName: arc-runner-set

# GitHub App authentication
githubConfigSecret: controller-manager

# Controller service account configuration
controllerServiceAccount:
  name: infra-arc-controller
  namespace: arc-systems

# Runner scale set configuration
autoscalingRunnerSet:
  runnerLabels:
    - self-hosted
    - linux
    - arc-runner-set

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  dockerdWithinRunnerContainer: true
  dockerEnabled: true

# Autoscaling
minRunners: 1
maxRunners: 3

# Container mode - dind (Docker-in-Docker)
containerMode:
  type: dind

# Runner pod template
template:
  spec:
    securityContext:
      fsGroup: 1000
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        env:
          - name: DOCKERHUB_USERNAME
            value: "amerenda"
          - name: DOCKERHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: DOCKERHUB_TOKEN
          - name: GITOPS_PAT
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: GITOPS_PAT

namespaceOverride: arc-runners
