apiVersion: apps/v1
kind: Deployment
metadata:
  name: moltbook-controller
  namespace: moltbook-manager
spec:
  replicas: 1
  # Recreate required: hostNetwork pod holds port 8082 exclusively on murderbot
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: moltbook-controller
  template:
    metadata:
      labels:
        app: moltbook-controller
    spec:
      # Must run on murderbot to reach localhost:8081 and docker socket
      nodeSelector:
        kubernetes.io/hostname: murderbot

      # Share host network so the pod can reach localhost:8081 (backend)
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      # Tolerate disk-pressure — this pod must run on murderbot specifically
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule

      containers:
        - name: controller
          image: amerenda/k3s-images:moltbook-controller-da3926d2db2e105a44a5995386bcf31c9d0beb32
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              # No hostPort needed — hostNetwork: true already exposes on host
          env:
            - name: BACKEND_URL
              value: "http://localhost:8081"
            - name: COMPOSE_FILE
              value: "/moltbook/docker-compose.yml"
            - name: COMPOSE_PROJECT
              value: "moltbook"
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run/docker.sock
            - name: moltbook-project
              mountPath: /moltbook
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /readyz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: moltbook-project
          hostPath:
            path: /home/alex/claude/projects/moltbook
            type: Directory
