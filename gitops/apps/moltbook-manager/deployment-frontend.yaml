apiVersion: apps/v1
kind: Deployment
metadata:
  name: moltbook-frontend
  namespace: moltbook-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moltbook-frontend
  template:
    metadata:
      labels:
        app: moltbook-frontend
    spec:
      containers:
        - name: frontend
          image: amerenda/k3s-images:moltbook-manager-b04e69669a8a6a05909e86ee81501bd88cd0f130
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
