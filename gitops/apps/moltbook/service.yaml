---
# ExternalName service — Kubernetes returns a CNAME to murderbot.amer.home,
# which BIND9 resolves to 10.100.20.19. No Endpoints or EndpointSlice needed.
apiVersion: v1
kind: Service
metadata:
  name: moltbook
  namespace: moltbook
spec:
  type: ExternalName
  externalName: murderbot.amer.home
  ports:
    - name: http
      port: 3002
      targetPort: 3002
      protocol: TCP
